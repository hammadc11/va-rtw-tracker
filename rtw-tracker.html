// Send reminder for one employee to appropriate recipients
async function sendReminder(emp, daysLeft, triggerDays) {
  const alertLabels = { 90:"90-Day Notice", 60:"60-Day Notice", 30:"30-Day Urgent", 15:"15-Day Final Alert" };
  const messages = {
    90: "Please ensure the visa extension application process has been started. The visa expires in 90 days.",
    60: "A visa extension application should be in progress. The visa expires in 60 days. Please confirm the application status.",
    30: "URGENT: The visa expires in 30 days. Immediate action is required to ensure continued right to work.",
    15: "FINAL ALERT: The visa expires in 15 days. If an extension has not been applied for, work must cease on the expiry date.",
  };
  const params = {
    employee_name: emp.name,
    department:    emp.department,
    rtw_type:      emp.rtwType + (emp.visaStatus ? ` — ${emp.visaStatus}` : ""),
    visa_expiry:   new Date(emp.visaExpiry).toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"}),
    days_remaining: String(daysLeft),
    alert_level:   alertLabels[triggerDays] || `${triggerDays}-Day Alert`,
    message:       messages[triggerDays] || "",
    tracker_url:   TRACKER_URL,
  };
  // Managers always get all alerts
  for(const email of MANAGER_EMAILS) {
    await sendEmail(email, {...params, recipient_type: "manager"});
  }
  // Staff only get 30-day and 15-day alerts
  if([30,15].includes(triggerDays) && emp.email) {
    await sendEmail(emp.email, {...params, recipient_type: "staff"});
  }
}

const SKIP_AUDIT = ["lastUpdatedBy","lastUpdatedAt","docStoragePath","id"];

function diffObjects(oldObj, newObj) {
  const changes = [];
  const keys = new Set([...Object.keys(oldObj||{}), ...Object.keys(newObj||{})]);
  for(const k of keys) {
    if(SKIP_AUDIT.includes(k)) continue;
    const ov = oldObj?.[k] ?? null;
    const nv = newObj?.[k] ?? null;
    if(String(ov) !== String(nv)) {
      changes.push({ field: k, label: HUMAN_LABELS[k]||k, from: ov, to: nv });
    }
  }
  return changes;
}

// LOGIN
// ═══════════════════════════════════════════════════════
function Login({onLogin}){
  const [u,setU]=useState("");const [p,setP]=useState("");const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  const go=()=>{setLoading(true);setErr("");setTimeout(()=>{const usr=USERS.find(x=>x.username===u&&x.password===p);if(usr)onLogin(usr);else setErr("Incorrect username or password");setLoading(false);},400);};
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#EFF6FF,#F8FAFC,#F0FDF4)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:400,background:"#fff",borderRadius:20,boxShadow:"0 20px 60px rgba(30,64,175,0.12)",overflow:"hidden"}}>
        <div style={{background:"linear-gradient(135deg,#1E40AF,#3B82F6)",padding:"36px 32px 28px",textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>🛡️</div>
          <div style={{color:"rgba(255,255,255,0.8)",fontSize:11,letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>Visiting Angels West London</div>
          <div style={{color:"#fff",fontSize:22,fontWeight:800}}>Right to Work Tracker</div>
        </div>
        <div style={{padding:"28px 32px"}}>
          {[["Username","text",u,setU],["Password","password",p,setP]].map(([lbl,t,v,s])=>(
            <div key={lbl} style={{marginBottom:16}}>
              <label style={{display:"block",color:"#475569",fontSize:12,fontWeight:600,marginBottom:6}}>{lbl}</label>
              <input type={t} value={v} onChange={e=>s(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}
                style={{width:"100%",padding:"11px 14px",border:`1px solid ${err?"#FCA5A5":"#E2E8F0"}`,borderRadius:10,fontSize:14,boxSizing:"border-box",outline:"none"}}/>
            </div>
          ))}
          {err&&<div style={{color:"#DC2626",background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"10px 14px",fontSize:13,marginBottom:16}}>{err}</div>}
          <button onClick={go} disabled={loading} style={{width:"100%",padding:"13px",background:"#1E40AF",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>
            {loading?"Signing in…":"Sign In →"}
          </button>
          <p style={{color:"#CBD5E1",fontSize:11,textAlign:"center",marginTop:20}}>Home Office compliant · Cloud RTW monitoring</p>
        </div>
      </div>
    </div>
  );
}

// MANAGE LISTS MODAL
// ═══════════════════════════════════════════════════════
function ManageLists({rtwTypes,departments,empStatuses,onSave,onClose}){
  const [rtw,setRtw]=useState([...rtwTypes]);
  const [depts,setDepts]=useState([...departments]);
  const [sts,setSts]=useState([...empStatuses]);
  const [inp,setInp]=useState({rtw:"",dept:"",status:""});
  const [tab,setTab]=useState("rtw");
  const secs={rtw:{label:"RTW Types",list:rtw,setList:setRtw,key:"rtw"},depts:{label:"Departments",list:depts,setList:setDepts,key:"dept"},status:{label:"Emp. Statuses",list:sts,setList:setSts,key:"status"}};
  const {list,setList,key}=secs[tab];
  const add=()=>{const v=inp[key].trim();if(v&&!list.includes(v)){setList([...list,v]);setInp(p=>({...p,[key]:""}));}};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:"100%",maxWidth:480,background:"#fff",borderRadius:16,boxShadow:"0 25px 60px rgba(0,0,0,0.2)",overflow:"hidden"}}>
        <div style={{padding:"18px 24px",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#0F172A"}}>Manage Dropdown Lists</div>
          <button onClick={onClose} style={{background:"#F1F5F9",border:"none",width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:16,color:"#64748B"}}>×</button>
        </div>
        <div style={{display:"flex",borderBottom:"1px solid #F1F5F9"}}>
          {Object.entries(secs).map(([id,s])=>(
            <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"11px 4px",background:"none",border:"none",borderBottom:`2px solid ${tab===id?"#1E40AF":"transparent"}`,color:tab===id?"#1E40AF":"#64748B",fontSize:11,fontWeight:700,cursor:"pointer",textTransform:"uppercase"}}>{s.label}</button>
          ))}
        </div>
        <div style={{padding:"20px 24px",minHeight:160}}>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <input value={inp[key]} onChange={e=>setInp(p=>({...p,[key]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Add new…" style={{flex:1,padding:"9px 12px",border:"1px solid #E2E8F0",borderRadius:8,fontSize:13,outline:"none"}}/>
            <button onClick={add} style={{padding:"9px 16px",background:"#1E40AF",color:"#fff",border:"none",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600}}>Add</button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {list.map(item=>(
              <span key={item} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 10px",background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:20,fontSize:12,color:"#334155"}}>
                {item}<button onClick={()=>setList(list.filter(x=>x!==item))} style={{background:"none",border:"none",cursor:"pointer",color:"#94A3B8",fontSize:14,padding:0,lineHeight:1}}>×</button>
              </span>
            ))}
          </div>
        </div>
        <div style={{padding:"14px 24px",borderTop:"1px solid #F1F5F9",display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"10px 20px",background:"#F1F5F9",border:"none",borderRadius:8,fontSize:13,cursor:"pointer",color:"#475569"}}>Cancel</button>

    const file=e.target.files[0];if(!file)return;
    if(file.size>10*1024*1024){setUploadErr("File too large — max 10MB");return;}
    setUploading(true);setUploadErr("");
    try{

      const url=await sb.uploadFile(path,file);
      set("docUrl",url);set("docName",file.name);set("docStoragePath",path);

    setUploading(false);
  };

    try{if(form.docStoragePath)await sb.deleteFile(form.docStoragePath);set("docUrl","");set("docName","");set("docStoragePath","");}catch(err){setUploadErr("Delete failed: "+err.message);}

function App(){
  const [user,setUser]=useState(null);
  const [employees,setEmployees]=useState([]);
  const [rtwTypes,setRtwTypes]=useState(DEF_RTW);
  const [departments,setDepts]=useState(DEF_DEPT);
  const [empStatuses,setEmpSts]=useState(DEF_EMPS);
  const [loading,setLoading]=useState(false);
  const [dbErr,setDbErr]=useState("");
  const [seeding,setSeeding]=useState(false);
  const [tab,setTab]=useState("dashboard");
  const [search,setSearch]=useState("");
  const [fDept,setFDept]=useState("All");
  const [fRtw,setFRtw]=useState("All");
  const [fStatus,setFStatus]=useState("Active");
  const [fAlert,setFAlert]=useState("All");
  const [fCheck,setFCheck]=useState("All");
  const [sortCol,setSortCol]=useState("days");
  const [sortDir,setSortDir]=useState("asc");
  const [selected,setSelected]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [showLists,setShowLists]=useState(false);
  const [auditLog,setAuditLog]=useState([]);
  const [auditLoading,setAuditLoading]=useState(false);
  const [monthlyResults,setMonthlyResults]=useState([]);
  const [monthlyError,setMonthlyError]=useState("");

  const loadData=useCallback(async()=>{
    setLoading(true);setDbErr("");
    try{
      const [emps,settings]=await Promise.all([sb.select(),sbSettings.get()]);
      setEmployees(emps||[]);
      if(settings){
        if(settings.rtwTypes?.length)setRtwTypes(settings.rtwTypes);
        if(settings.departments?.length)setDepts(settings.departments);
        if(settings.empStatuses?.length)setEmpSts(settings.empStatuses);
      }
    }catch(e){setDbErr(e.message);}
    setLoading(false);
  },[]);

  useEffect(()=>{if(user)loadData();},[user,loadData]);

  useEffect(()=>{
    if(tab==="audit"&&user){
      setAuditLoading(true);
      sbAudit.fetch(300).then(logs=>{setAuditLog(logs);setAuditLoading(false);});
    }
  },[tab,user]);

  // ── Reminder engine — runs once on load ──────────────────
  useEffect(()=>{
    if(!user||employees.length===0) return;
    const runReminders=async()=>{
      const sent=await sbReminders.getSent();
      const sentSet=new Set(sent.map(s=>`${s.employee_id}_${s.trigger_days}`));
      const triggers=[90,60,30,15];
      for(const emp of employees){
        if(emp.employmentStatus!=="Active"||!emp.visaExpiry) continue;
        const d=daysLeft(emp.visaExpiry);
        if(d===null||d<0) continue;
        for(const t of triggers){
          if(d<=t){
            const key=`${emp.id}_${t}`;
            if(!sentSet.has(key)){
              await sendReminder(emp,d,t);
              await sbReminders.markSent(emp.id,t);
              sentSet.add(key);
            }
          }
        }
      }
    };
    runReminders();
  },[employees.length>0]);

  const seedDatabase=async()=>{
    setSeeding(true);setDbErr("");
    try{
      const rows=SEED.map(emp=>({
        name:emp.name,department:emp.department,rtwType:emp.rtwType,
        visaExpiry:emp.visaExpiry||null,visaStatus:emp.visaStatus||"",
        employmentStatus:emp.employmentStatus,email:emp.email||"",notes:emp.notes||"",
        dateAdded:TODAY,lastVisaCheck:emp.visaExpiry?TODAY:null,
        nextCheckDate:emp.visaExpiry?addMonths(TODAY,6):null,
        docUrl:"",docName:"",docStoragePath:"",spLink:"",
        lastUpdatedBy:"System",lastUpdatedAt:new Date().toISOString(),
      }));
      await sb.insertBulk(rows);
      await sbAudit.log(null,"All Staff","bulk_import","System",[{field:"action",label:"Action",from:null,to:"Imported 133 staff from spreadsheet"}]);
      await loadData();
    }catch(e){setDbErr("Seed failed: "+e.message);}
    setSeeding(false);
  };

  const saveEmployee=async(emp)=>{
    try{
      const{id,...row}=emp;
      delete row.docData; delete row.docFileName;
      if(id===0){
        const created=await sb.insert(row);
        setEmployees(p=>[...p,created]);

      } else {
        // Get old record for diff
        const oldEmp=employees.find(e=>e.id===id)||{};
        const changes=diffObjects(oldEmp,row);
        const updated=await sb.update(id,row);
        setEmployees(p=>p.map(e=>e.id===id?(updated||{...e,...row}):e));
        if(changes.length>0){
          await sbAudit.log(id,row.name,"updated",emp.lastUpdatedBy||"Unknown",changes);
          // If visa expiry changed, clear sent reminders so they re-trigger
          if(changes.some(c=>c.field==="visaExpiry")){
            await sbReminders.clearForEmployee(id);
          }
        }
      }
    }catch(e){alert("Save failed: "+e.message);}

  // ── Fuzzy name matching ──────────────────────────────────
  const fuzzyScore=(a,b)=>{
    a=a.toLowerCase().replace(/[^a-z\s]/g,"").replace(/\s+/g," ").trim();
    b=b.toLowerCase().replace(/[^a-z\s]/g,"").replace(/\s+/g," ").trim();
    if(a===b) return 100;
    // Check if all words of shorter name appear in longer name
    const wa=a.split(" "); const wb=b.split(" ");
    const shorter=wa.length<=wb.length?wa:wb;
    const longer=wa.length<=wb.length?wb:wa;
    const matchedWords=shorter.filter(w=>longer.some(lw=>lw.startsWith(w)||w.startsWith(lw)||lw===w));
    const wordScore=(matchedWords.length/shorter.length)*100;
    // Simple char overlap score
    const setA=new Set(a.split("")); const setB=new Set(b.split(""));
    const intersection=[...setA].filter(c=>setB.has(c)).length;
    const charScore=(intersection/Math.max(setA.size,setB.size))*100;
    return Math.round((wordScore*0.7)+(charScore*0.3));
  };

  const matchName=(inputName,dbEmployees)=>{
    let best=null; let bestScore=0;
    for(const emp of dbEmployees){
      const score=fuzzyScore(inputName,emp.name);
      if(score>bestScore){bestScore=score;best=emp;}
    }
    return bestScore>=60?{match:best,confidence:bestScore}:{match:null,confidence:0};
  };

  // ── Monthly file upload handler ──────────────────────────
  const handleMonthlyUpload=async(e)=>{
    const file=e.target.files[0]; if(!file) return;
    setMonthlyError(""); setMonthlyResults([]);
    try{
      // Read file as text for CSV, or use SheetJS-like parsing for xlsx
      const reader=new FileReader();
      reader.onload=async(ev)=>{
        try{
          let names=[];
          const fname=file.name.toLowerCase();
          if(fname.endsWith(".csv")){
            // Parse CSV
            const text=ev.target.result;
            const lines=text.split("\n").filter(l=>l.trim());
            // Find name column (first column with text that looks like names)
            const header=lines[0].split(",");
            const nameColIdx=header.findIndex(h=>/name/i.test(h));
            const colIdx=nameColIdx>=0?nameColIdx:0;
            names=lines.slice(1).map((l,i)=>{
              const cols=l.split(",");
              return {rowNum:i+2,name:(cols[colIdx]||"").replace(/"/g,"").trim()};
            }).filter(n=>n.name&&!/^\d+$/.test(n.name));
          } else {
            // Parse xlsx using SheetJS
            const arr=ev.target.result;
            const wb=XLSX.read(arr,{type:"array"});
            const ws=wb.Sheets[wb.SheetNames[0]];
            const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
            if(data.length<2){setMonthlyError("File appears empty.");return;}
            // Find name column
            const header=data[0].map(h=>String(h).toLowerCase());
            const nameColIdx=header.findIndex(h=>h.includes("name"));
            const colIdx=nameColIdx>=0?nameColIdx:1; // default to col B if no header
            names=data.slice(1).map((row,i)=>{
              const val=String(row[colIdx]||"").trim();
              return{rowNum:i+2,name:val};
            }).filter(n=>n.name&&n.name.length>2&&!/^\d+$/.test(n.name));
          }
          if(names.length===0){setMonthlyError("Could not extract names from file. Please save as CSV and try again.");return;}
          // Match against database
          const results=names.map(({rowNum,name})=>{
            const {match,confidence}=matchName(name,employees);
            const d=match?daysLeft(match.visaExpiry):null;
            const visaExpired=d!==null&&d<0;
            const status=!match?"not_found":match.employmentStatus;
            return{rowNum,inputName:name,match,confidence,daysLeft:d,visaExpired,status};
          });
          setMonthlyResults(results);
        }catch(err){setMonthlyError("Failed to parse file: "+err.message);}
      };
      if(file.name.toLowerCase().endsWith(".csv")) reader.readAsText(file);
      else reader.readAsArrayBuffer(file);
    }catch(err){setMonthlyError("Upload failed: "+err.message);}
    e.target.value="";
  };

                <div style={{fontSize:40,marginBottom:16}}>📋</div>
                <div style={{fontSize:16,fontWeight:700,color:"#0F172A",marginBottom:8}}>No file uploaded yet</div>
                <div style={{color:"#64748B",fontSize:13,maxWidth:400,margin:"0 auto"}}>Upload your monthly staff list above. The tool will cross-reference every name against the RTW database and produce a full compliance report.</div>
              </div>
            )}
          </div>
        )}

      </div>{/* end main content */}

      {/* MODALS */}
      {selected&&<EmpModal emp={selected} onClose={()=>setSelected(null)} onSave={saveEmployee} onArchive={archiveEmployee} rtwTypes={rtwTypes} departments={departments} empStatuses={empStatuses} user={user}/>}
      {showNew&&<EmpModal emp={{id:0,name:"",department:departments[0],rtwType:rtwTypes[0],visaExpiry:null,visaStatus:"",employmentStatus:"Active",email:"",notes:"",dateAdded:TODAY,lastVisaCheck:null,nextCheckDate:null,docUrl:"",docName:"",docStoragePath:"",spLink:"",lastUpdatedBy:user.name,lastUpdatedAt:new Date().toISOString()}} onClose={()=>setShowNew(false)} onSave={saveEmployee} onArchive={()=>{}} rtwTypes={rtwTypes} departments={departments} empStatuses={empStatuses} user={user}/>}
      {showLists&&isAdmin(user)&&<ManageLists rtwTypes={rtwTypes} departments={departments} empStatuses={empStatuses} onSave={saveLists} onClose={()=>setShowLists(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
